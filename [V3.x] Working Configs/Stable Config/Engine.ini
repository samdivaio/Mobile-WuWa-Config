;=================================================
; Renderer Settings
;=================================================
[Script/Engine.RendererSettings]
r.Mobile.EnableLandscapeSSR=1
r.Android.DisableVulkanSupport=0
r.HZBOcclusion=0        ;ONLY change this to 1 if you're experiencing black/white FLICKERING

[SystemSettings]
r.Mobile.DeviceEvaluation=3
r.MaterialQualityLevel=2
r.Anisotropy=8
r.KuroMaterialQualityLevel=2

;============================
; Shadows
;============================
r.ShadowQuality=3
r.Shadow.DistanceScale=1.2
r.Shadow.RadiusThreshold=0.02
r.Shadow.MaxCSMResolution=512
r.Shadow.MinResolution=512
r.Shadow.PerObjectShadowMapResolution=512
r.Shadow.PerObjectResolutionMax=512
r.Shadow.PerObjectResolutionMin=256

;============================
; Distance and LOD
; Default LODBias = 0
;============================
foliage.LODDistanceScale=0.85
r.StaticMeshLODBias=-1
r.SkeletalMeshLODBias=-1
r.ParticleLODBias=-1
r.MipMapLODBias=0
r.LandscapeLODBias=0
r.UITextureLODBias=0

;============================
; Water and Reflections
;============================
r.SSR.HalfResSceneColor=0
r.Mobile.WaterSSRResDiv=1.2
r.Mobile.WaterSSRStep=64
r.Mobile.EnableLandscapeSSR=1
r.Mobile.SSRLowPrecisionDepth=0
r.ReflectionCaptureResolution=64
r.MobileLightShaft.DownSampleFactor=1.25

;============================
; Anti-Aliasing
;============================
r.TemporalAA.MobileUpsampling=1
r.TemporalAA.MobileStaticFrameWeight=0.25
r.TemporalAA.MobileFrameWeight=0.25
r.TemporalAA.UseMobileConfig=1
r.TemporalAA.Upscaler=1
r.TemporalAACatmullRom=1

;============================
; Post Processing / Techniques
;============================
r.Tonemapper.Quality=1
r.Mobile.GTAO.Quality=3
r.SSGI.Quality=1
r.SSR.Quality=3
r.SSR.MaxRoughness=0.8
r.MotionBlurQuality=0
r.Kuro.KuroBloomStreak=1
r.Mobile.DisableTextureStreaming=0
r.Color.Max=1.1
r.Color.Mid=0.48
r.Tonemapper.Quality=4
r.Tonemapper.Sharpen=0.65
r.KuroTonemapping=1
r.Tonemapper.MergeWithUpscale.Mode=1
r.TonemapperGamma=2.0
r.Upscale.Quality=4
;=================================================
; Honami Escalator (Blueprint-related)
;=================================================
 Blueprint.EnableFrameScripts=1
 Blueprint.EnableEvents=1
 Blueprint.EnableEventsBudget=0
 Blueprint.EnableFrameScriptsBudget=0
 Kuro.Blueprint.EnableFrameScriptsBudget=0
 Kuro.Blueprint.EnableEventsBudget=0
 Kuro.Blueprint.EnableGameBudget=0
 Kuro.Blueprint.EnableEvents=1
 Kuro.Blueprint.EnableFrameScripts=1

[/Script/Engine.StreamingSettings]
r.TextureStreaming=1
r.Streaming.FullyLoadUsedTextures=0  ; Set to 0 to save memory by streaming textures instead of forcing full load
r.Streaming.UseAsyncRequestsForDDC=1  ; Use async requests for Derived Data Cache to prevent stalls
r.Streaming.UseBackgroundThreadPool=1 ; Enable background thread pool for streaming
r.Streaming.UseMaterialData=1         ; Use material data to optimize streaming decisions
r.Streaming.UseNewMetrics=1           ; Newer streaming metrics provide better quality/performance balance
r.Streaming.UsePerTextureBias=1       ; Allows per texture biasing to optimize memory usage
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1          ; Keep EDL enabled for async streaming
s.WarnIfTimeLimitExceeded=0           ; Disable warnings for smoother logs
s.UseBackgroundLevelStreaming=1       ; Background streaming enabled to eliminate stalls
s.PriorityLevelStreamingActorsUpdateExtraTime=6.0 ; Eggsie's Recommendation (raised from 5 to 6)
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0               ; Lower to eliminate long unregister spikes
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0                ; Reduce async loading time budget to keep smoothness
r.RenderTargetPoolMin=400				; Eggsie's Recommendation is 600, but im lowering it to 400
s.IoDispatcherBufferMemoryMB=128			; Eggsie's Recommendation
s.IoDispatcherBufferSizeKB=256				; Eggsie's Recommendation
s.IoDispatcherCacheSizeMB=0				; Eggsie's Recommendation
s.LevelStreamingActorsUpdateTimeLimit=6.0

[/Script/Engine.GarbageCollectionSettings]
gc.AllowIncrementalReachability=1
gc.AllowIncrementalGather=1
gc.IncrementalReachabilityTimeLimit=0.001
gc.IncrementalGCTimePerFrame=0.001
gc.AllowInitialGarbageCollection=1
gc.CollectGarbageEveryFrame=0
gc.DisableAutomaticGC=0
gc.ForceGCAtRegularInterval=0
gc.MinDesiredObjectsPerSubTask=20
gc.StallCollectionWhileWaiting=0
gc.TimeBetweenPurgingPendingKillObjects=51.1
gc.NumRetriesBeforeForcingGC=10
gc.AllowParallelGC=1
gc.MultithreadedDestructionEnabled=1
gc.CreateGCClusters=1
gc.ActorClusteringEnabled=1
gc.AssetClusteringEnabled=1
gc.BlueprintClusteringEnabled=1
gc.PendingKillEnabled=1
gc.ContinuousIncrementalGC=1
gc.DelayReachabilityIterations=0
gc.MaxObjectsNotConsideredByGC=200
gc.SizeOfPermanentObjectPool=2097152
gc.MinGCClusterSize=5
gc.MaxObjectsInGame=1000000

