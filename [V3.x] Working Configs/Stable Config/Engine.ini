; 			ChangeLog:
; February 12, 2026
; 1. Adjusted memory values
; 2. Added Streaming Section
; 3. Adjusted SSR quality (should now glossy-reflect)
; 4. Removed Vulkan Section
; 5. Added Tonemapping and TonemapperGamma(2.2 is default)
; January 3, 2026
; 1. Reworked Vulkan configuration: enabled async compute, frame pacing, parallel rendering, and updated descriptor layout.
; 2. Lowered shadow resolution and distance scaling to improve stability and reduce GPU load.
; 3. Relaxed LOD biases (meshes, particles, UI textures) for better performance on mid-end devices.
; 4. Reduced SSR quality and shadow precision to minimize visual artifacts and stutter.
; 5. Retained landscape SSR and water SSR while keeping half-res scene color for performance.
; 6. Preserved mobile TAA configuration with Catmull-Rom filtering and mobile upsampling.
; 7. Disabled bloom streaks and motion blur to reduce post-processing overhead.
; 8. Removed extended Kuro foliage culling overrides, reverting closer to engine defaults.
; 9. Kept Honami Escalator Blueprint support unchanged.
; 10. Added incremental and parallel garbage collection tuning to reduce runtime hitches.
; 11. Added the optional HZBOcclusion. Read before attempting usage.
; -> I did not include the streaming code block for the Stable Config, however I will assign poolsize in the DeviceProfiles
; ___________________________________________________________
; Dec 30, 2025
; Hello, for those who'd like the old stable config, it is still available in [V2.8] Config Arglax -> Config_2
; This new stable config is aimed to utilize the game's defaults. Hence, we'll keep crashing and bugs to a minimum.
; This is also actually a high-end config but mid-end users can use this as well.
; If your DeviceProfiles.ini is not being read, leave an issue or tag me in Discord.
; 1. Added Honami Escalator-enabling code
; You can always send your feedback in discord for improvement.
;_____________________________________________________________
; Dec 29, 2025
; 1. Created the config.
; ============================================================
