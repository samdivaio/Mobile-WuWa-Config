;		WuWa Mobile Config for Version 3.1
; 		   Last Modified by: Arglax
; ============================================================
; 			Stable Config (High-End)
; Link: https://github.com/Arglax/Mobile-WuWa-Config/blob/main/%5BV3.x%5D%20Working%20Configs/Stable%20Config/Engine.ini
; ============================================================
; 			ChangeLog:
; February 27, 2026 (Recommended Update)
; 1. Corrected cvars and removed unregistered CVars
; - this is due to an oversight with the sorting made by the AI
; 2. Adjusted some values for better performance
; 3. I added the lightshaft cvars (godrays)
; ============================================================
; 			Final Notes
; 1. If you have a phone that is around 2022 or older, and this config doesn't perform well for you, please use the Potato Config
;	Potato Config Link: https://github.com/Arglax/Mobile-WuWa-Config/tree/main/%5BV3.x%5D%20Working%20Configs/Potato%20Config
;	Config Main Repository: https://github.com/Arglax/Mobile-WuWa-Config/
; ============================================================
; 			References Used:
; 1. Archived Mobile Configs by AlteriaX 	(https://github.com/AlteriaX/WuWa-Configs-Android/tree/main)
; 2. UE Official CVar Reference 	(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
; 3. Eggsie's recommendations for streaming values
;====================END OF MAIN NOTES=======================

[SystemSettings]
foliage.LODDistanceScale=1.0
r.MaxAnisotropy=8
r.Color.Mid=0.45
r.FidelityFX.FI.Enabled=1
r.FidelityFX.FSR.Enabled=1
r.FidelityFX.FSR.PrimaryUpscale=1
r.FidelityFX.FSR.QualityMode=1

r.LightShaftAllowTAA=1
r.LightShaftBlurPasses=3
r.LightShaftDownSampleFactor=2
r.LightShaftFirstPassDistance=0.1
r.LightShaftNumSamples=16
r.LightShaftQuality=1
r.LightShaftRenderToSeparateTranslucency=0

r.MipMapLODBias=0
r.MotionBlurQuality=0
r.ParticleLODBias=0
r.ReflectionCaptureResolution=64    
r.SSGI.Quality=2
r.SSR.HalfResSceneColor=1
r.SSR.MaxRoughness=1.0
r.SSR.Quality=4
r.Shadow.DistanceScale=2                
r.Shadow.MaxCSMResolution=2048       
r.Shadow.MinResolution=64
r.ShadowQuality=5
r.Shadow.RadiusThreshold=0.02  
r.TemporalAA.Algorithm=1
r.TemporalAA.AllowDownsampling=1
r.TemporalAACatmullRom=1
r.TemporalAACurrentFrameWeight=0.16
r.TemporalAAFilterSize=1.0
r.TemporalAA.HistoryScreenPercentage=100
r.TemporalAAPauseCorrect=1
r.TemporalAA.Quality=2
r.TemporalAASamples=16
r.TemporalAA.Upsampling=1
r.TemporalAA.Upscaler=1
r.TemporalAA.UseMobileConfig=1
r.Tonemapper.Quality=4                  
r.TonemapperGamma=2.05
r.Upscale.Quality=3

;=================================================
; Honami Escalator (this makes the escalator in Honami visually move)
;=================================================
Kuro.Blueprint.EnableGameBudget=0

[RendererSettings]
r.Android.DisableVulkanSupport=0
r.Kuro.Foliage.MobileFarCullDistanceMax=20000
r.Kuro.Foliage.MobileGrassCullDistanceMax=15000
r.Kuro.Foliage.MobileImpostorFarCullDistanceMax=100000
r.Kuro.Foliage.MobileMiddleCullDistanceMax=10000
r.Kuro.Foliage.MobileNearCullDistanceMax=6000
r.DefaultBackBufferPixelFormat=4
r.SceneColorFringeQuality=0        
r.SSR.HalfResSceneColor=1                               
r.Kuro.KuroBloomStreak=0

[/Script/Engine.StreamingSettings]
r.TextureStreaming=1
r.Streaming.FullyLoadUsedTextures=0    
r.Streaming.UseAsyncRequestsForDDC=1     
r.Streaming.UseBackgroundThreadPool=1      
r.Streaming.UseMaterialData=1      
r.Streaming.UseNewMetrics=1         
r.Streaming.UsePerTextureBias=1              
r.RenderTargetPoolMin=600                 
s.AsyncLoadingThreadEnabled=1                   
s.EventDrivenLoaderEnabled=1                 
s.WarnIfTimeLimitExceeded=0                        
s.UseBackgroundLevelStreaming=1                     
s.PriorityLevelStreamingActorsUpdateExtraTime=6.0   
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0                 
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0          
s.IoDispatcherBufferMemoryMB=128          
s.IoDispatcherBufferSizeKB=256             
s.IoDispatcherCacheSizeMB=0               
s.LevelStreamingActorsUpdateTimeLimit=6.0

