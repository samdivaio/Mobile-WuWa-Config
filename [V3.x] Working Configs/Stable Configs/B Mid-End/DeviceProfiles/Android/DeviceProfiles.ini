;		WuWa Mobile Config for Version 3.2
; 		   Last Modified by: Arglax
; ============================================================
; 			Stable Config (Mid-End)
; Link: https://github.com/Arglax/Mobile-WuWa-Config/blob/main/%5BV3.x%5D%20Working%20Configs/Stable%20Config/Engine.ini
; ============================================================
; 			ChangeLog:
; April 19, 2026 (Optional Update)
; 1. Added KuroFI
; March 20, 2026 (Recommended Update)
; 1. Removed forbidden cvars
; 2. Raised DeviceScore to 4000 since 2000 now sometimes trigger the AUTOFPS prompt (weird lol)
; 		Final Notes
; - Change r.MobileContentScaleFactor to 1.0 or 1.25 for better performance/fps
; ============================================================
; 			References Used:
; 1. Archived Mobile Configs by AlteriaX 	(https://github.com/AlteriaX/WuWa-Configs-Android/tree/main)
; 2. UE Official CVar Reference 	(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
;====================END OF MAIN NOTES=======================
[Android_StableMidEnd DeviceProfile]
Cvars=r.MobileContentScaleFactor=1.25
CVars=r.SecondaryScreenPercentage.GameViewport=85
Cvars=r.Mobile.DeviceEvaluation=3
Cvars=r.Mobile.HighQualityMaterial=1
Cvars=r.Android.DisableVulkanSupport=0
Cvars=r.imp.SSMbScaleLod0=0.00
Cvars=r.imp.SSMbScaleLod1=0.00
Cvars=r.FEstimation.Option=1
Cvars=r.KuroFI.Enable=1
