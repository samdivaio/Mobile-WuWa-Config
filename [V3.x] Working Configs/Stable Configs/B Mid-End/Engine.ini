[SystemSettings]
;Change value to 1 for Kuro's Frame Interpolation. It may produce bad results when moving tho...
r.KuroFI.Enable=1

r.MobileContentScaleFactor=1.25
r.SecondaryScreenPercentage.GameViewport=85
r.Mobile.HighQualityMaterial=1
r.imp.SSMbScaleLod0=0.00
r.imp.SSMbScaleLod1=0.00

r.MaxAnisotropy=8
r.Color.Mid=0.45
r.LightShaftAllowTAA=1
r.LightShaftBlurPasses=3
r.LightShaftDownSampleFactor=2
r.LightShaftFirstPassDistance=0.1
r.LightShaftNumSamples=12
r.LightShaftQuality=1
r.MotionBlurQuality=0
r.ParticleLODBias=0
r.ReflectionCaptureResolution=128   
r.SSR.HalfResSceneColor=1
r.SSR.MaxRoughness=1.0
r.SSR.Quality=4                
r.Shadow.MinResolution=256
r.ShadowQuality=4
r.Shadow.RadiusThreshold=0.02  

r.TemporalAA.Algorithm=1
r.TemporalAA.AllowDownsampling=1
r.TemporalAACatmullRom=1
r.TemporalAACurrentFrameWeight=0.25
r.TemporalAA.MobileFrameWeight=0.20
r.TemporalAA.MobileUpsampling=1
r.TemporalAAFilterSize=0.7
r.TemporalAA.HistoryScreenPercentage=100
r.TemporalAASamples=12
r.TemporalAA.Upsampling=1
r.TemporalAA.Upscaler=1
r.Tonemapper.Quality=4                  
r.TonemapperGamma=2.05
r.Upscale.Quality=2

;=================================================
; Honami Escalator (this makes the escalator in Honami visually move)
;=================================================
Kuro.Blueprint.EnableGameBudget=0

[/Script/Engine.RendererSettings]
r.Android.DisableVulkanSupport=0      
r.Kuro.Foliage.MobileFarCullDistanceMax=30000
r.Kuro.Foliage.MobileGrassCullDistanceMax=20000
r.Kuro.Foliage.MobileImpostorFarCullDistanceMax=100000
r.Kuro.Foliage.MobileMiddleCullDistanceMax=20000
r.Kuro.Foliage.MobileNearCullDistanceMax=10000
r.Kuro.KuroBloomStreak=0
r.StaticMeshLODDistanceScale=1.0
[/Script/Engine.StreamingSettings]
r.TextureStreaming=1
r.Streaming.FullyLoadUsedTextures=0        
r.Streaming.UseBackgroundThreadPool=1      
r.Streaming.UseMaterialData=1      
r.Streaming.UseNewMetrics=1         
r.Streaming.UsePerTextureBias=1                              
s.AsyncLoadingThreadEnabled=1                   
s.EventDrivenLoaderEnabled=1                 
s.WarnIfTimeLimitExceeded=0                        
s.UseBackgroundLevelStreaming=1                     
s.PriorityLevelStreamingActorsUpdateExtraTime=6.0   
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0                 
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0          
s.IoDispatcherBufferMemoryMB=128          
s.IoDispatcherBufferSizeKB=256             
s.IoDispatcherCacheSizeMB=0               
s.LevelStreamingActorsUpdateTimeLimit=6.0

