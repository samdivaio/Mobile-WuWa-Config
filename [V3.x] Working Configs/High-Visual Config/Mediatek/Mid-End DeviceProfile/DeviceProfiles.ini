; 			References Used:
; 1. CVars Dump by em00se 		(https://pastebin.com/ewk6wz9W)
; 2. Cleaned Dump by AlteriaX/Brandy 	(https://pastebin.com/KUNNVZeC)
; 3. UE Official CVar Reference 	(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
; 4. Eggsee's Recommendations
; ====================END OF MAIN NOTES=======================

[Android_HighVisuals DeviceProfile] 
;Change to 1.0 for perf, 1.5 for quality, 2.0 if using Tablet
CVars=r.MobileContentScaleFactor=1.35

CVars=r.SecondaryScreenPercentage.GameViewport=100
CVars=r.DefaultFeature.AntiAliasing=2
CVars=r.imp.SSMbScaleLod0=0.00
CVars=r.imp.SSMbScaleLod1=0.00
CVars=wp.Runtime.LoadingRangeScale=1.05
CVars=wp.Runtime.PlannedLoadingRangeScale=1.2

; Main CVars
CVars=r.Mobile.DeviceEvaluation=3
CVars=r.Mobile.HighQualityMaterial=1
CVars=r.Android.DisableVulkanSupport=0
CVars=r.FEstimation.Option=1

; Optional CVars
CVars=r.HDR.EnableHDROutput=1
Cvars=r.Vulkan.RobustBufferAccess=1

; Scalability Groups
; For mid-end devices, use 2-3 
; flagship can use max value of 4
; postprocessquality max is 6
; effectsquality max 2 or else crash
CVars=sg.ViewDistanceQuality=2
CVars=sg.AntiAliasingQuality=2
CVars=sg.ShadowQuality=2
CVars=sg.PostProcessQuality=4
CVars=sg.TextureQuality=2
CVars=sg.EffectsQuality=2
CVars=sg.FoliageQuality=1
CVars=sg.ShadingQuality=2

;Frame Generation CVar (Will not work if your device is not supported, but you will see the toggle)
CVars=r.MFRC.Enable=1
;================================================================================
; 		End of Main Device Profile "Android_HighVisuals"
;		Below are the list of known/specified chipsets
;	If your DeviceProfile is not working, just send me your GPU Name
;================================================================================
