[SystemSettings]
;Enable Honami Escalator
Kuro.Blueprint.EnableGameBudget=0
r.Kuro.KuroBloomStreak=1
r.MipMapLODBias=0
r.Streaming.MipBias=0
r.SkeletalMeshLODBias=-0.5        
r.StaticMeshLODBias=-0.5
r.LandscapeLODBias=0
r.StaticMeshLODDistanceFactor=1.0
r.ParticleLODBias=0           
r.StencilForLODDither=1
r.StencilLODMode=1
;============================================
;	      Ambient Occlusion
;============================================
r.DefaultFeature.AmbientOcclusion=1
r.AOQuality=2
r.AOApplyToStaticIndirect=1
r.AOAsyncBuildQueue=1
r.AOAverageObjectsPerCullTile=768
r.AOGlobalDistanceField=1
r.AOSpecularOcclusionMode=1
r.AmbientOcclusionLevels=2
r.AmbientOcclusion.Method=1
r.AmbientOcclusionMaxQuality=100
r.AmbientOcclusion.HalfRes=1
r.AmbientOcclusionRadiusScale=1.05
r.AOApplyToStaticDirect=1
r.AmbientOcclusion.FadeRadiusScale=0.95
r.AmbientOcclusion.UseHistory=1
r.AllowPrecomputedVisibility=1
;============================================
;	  	 Lightshafts
;============================================ 
r.LightShaftQuality=1
r.LightShaftAllowTAA=1
r.LightShaftDownSampleFactor=2
r.LightShaftBlurPasses=3
r.LightShaftNumSamples=12
r.LightShaftFirstPassDistance=0.1
r.LightShaftRenderToSeparateTranslucency=1
r.MobileLightShaft=1
r.MobileLightShaft.AllowTAA=0
r.MobileLightShaft.BloomScale=0.7
r.MobileLightShaft.DownSampleFactor=1.0
r.MobileLightShaft.NumSamples=12
r.MobileLightShaft.UseLocalLightShaft=1
r.DefaultFeature.LensFlare=0
r.KuroMobile.LensFlareQuality=2
r.LensFlareQuality=1

;============================================
;       Screen Space Reflections/GI
;============================================ 
r.SSR.Quality=4	
r.SSR.MaxRoughness=1.0
r.SSR.Temporal=1
r.SSR.HalfResSceneColor=1
r.SSR.ExperimentalDenoiser=1
r.SSR.Stencil=1
r.SSR.TiledComposite=1
r.SSGI.Enable=1
r.SSGI.Quality=2
r.SSGI.HalfRes=1
r.SSGI.LeakFreeReprojection=1
r.SSGI.RejectUncertainRays=1
r.SSGI.TerminateCertainRay=1
r.ReflectionEnvironment=1
r.ReflectionEnvironmentBeginMixingRoughness=0.1
r.ReflectionEnvironmentEndMixingRoughness=0.3
r.ReflectionEnvironmentLightmapMixing=1
r.ReflectionCaptureResolution=128
r.ReflectionCaptureSupersampleFactor=2
r.Reflections.Denoiser=2
r.RefractionQuality=1
r.Mobile.UseScreenPassSSR=1
r.Mobile.EnableLandscapeSSR=1
r.Mobile.SceneObjMobileSSR=1
r.Mobile.SSRLowPrecisionDepth=1
;============================================
;	   Temporal Anti-Aliasing
;============================================
r.TemporalAA.AfterTonemapper=0
r.TemporalAA.Algorithm=1
r.TemporalAA.AllowDownsampling=1
r.TemporalAACatmullRom=1
r.TemporalAACurrentFrameWeight=0.2
r.TemporalAAFilterSize=1.0
r.TemporalAA.HistoryScreenPercentage=100
r.TemporalAAPauseCorrect=1
r.TemporalAA.Quality=2
r.TemporalAASamples=12
r.TemporalAA.Upsampling=1
r.TemporalAA.Upscaler=1
r.TemporalAAUpsampleFiltered=1
r.TemporalAA.MobileFrameWeight=0.25
r.TemporalAA.MobileGatherDepth=1
r.TemporalAA.MobileStaticFrameWeight=0.25
r.TemporalAA.MobileUpsampling=1
;============================================
;	 	  Shadows
;============================================
r.ShadowQuality=4
r.Shadow.CSM.MaxCascades=8
r.Shadow.CSM.MaxMobileCascades=8
r.Shadow.CSMDepthBias=8.0
r.Shadow.CSM.SlopeScaleDepthBias=4.0
r.Shadow.CSMSplitPenumbraScale=0.7
r.Shadow.CSM.TransitionScale=1.0
r.Shadow.DistanceScale=1.0
r.Shadow.RadiusThreshold=0.005
r.Shadow.RadiusThresholdOverrideEnable=1
r.Shadow.MinResolution=256
r.Shadow.PerObject=1
r.CapsuleShadows=1
r.CapsuleDirectShadows=1
r.CapsuleIndirectShadows=1
r.CapsuleKuroAO=1
r.CapsuleShadowsFullResolution=0
r.Shadow.StencilCulling=1
r.Shadow.StencilOptimization=1
r.Mobile.AllowDistanceFieldShadows=1
r.Mobile.AllowDitheredLODTransition=1
;============================================
;		 Lighting and GI
;============================================
r.Kuro.GlobalLightQuality=3
r.Kuro.GlobalGIRenderQuality=3
r.SkylightIntensityMultiplier=0.75
r.SkyLight.RealTimeReflectionCapture=1
r.SkyLight.RealTimeReflectionCapture.ShadowFromOpaque=1
r.SkyLightingQuality=1
r.Kuro.EnableAtmosphereLightDirection=1
;============================================
;	 	  Mobile
;============================================
r.Mobile.UseClusteredDeferredShading=1
r.Mobile.SupportsGen4TAA=1
r.Mobile.HighQualitySkyCaptureFiltering=1
r.MobileHDR=1
bMobileHDR=True
r.SceneColorFormat=4
r.HDR.EnableHDROutput=1
; ============================================================
; 		    Water & Reflections
; ============================================================
r.Water.SingleLayer=1
r.Water.SingleLayer.RefractionFullPrecision=0
r.Water.SingleLayer.RTR=1
r.Water.SingleLayer.SSR=1
r.Water.SingleLayer.SSRTAA=1
r.Water.SingleLayer.TiledComposite=1
r.Water.SingleLayer.Reflection=1
r.Water.SingleLayer.RefractionDownsampleFactor=1
r.Mobile.EnableWaterReflection=1
r.Mobile.WaterSSR=1
r.Mobile.WaterSSRResDiv=1.0
r.Mobile.WaterSSRStep=64
r.Kuro.InteractionEffect.UseCppWaterEffect=1
; ============================================================
; 		Foliage, Grass & Landscape
; ============================================================
foliage.LODDistanceScale=1
foliage.DensityScale=0.5
grass.densityScale=0.5
grass.DiscardDataOnLoad=0
r.Landscape.KuroLOD0Distance=10000
r.LandscapeLOD0DistributionScale=0.90
r.LandscapeLODDistributionScale=0.95
r.Mobile.Kuro.LandscapeCaptureSize=10000
; ============================================================
; 			Virtual Textures
; ============================================================
r.VirtualTexture=1
r.VirtualTextures=1
r.VirtualTexturedLightmaps=1
r.VT.AnisotropicFiltering=16
r.VT.MaxAnisotropy=16
r.VT.PoolSize=1536
r.VT.TileSize=512                             

; ============================================================
; 			Anisotropic Filtering
; ============================================================
r.AnisotropicMaterials=1
r.MaxAnisotropy=16
Compat.UseDXT5NormalMaps=0

; ============================================================
; 			Niagara & Particles
; ============================================================
Fx.AllowCulling=1
FX.AllowGPUSorting=0
FX.AllowAsyncTick=1
FX.AllowGPUParticles=1
FX.AllowCulling=1
fx.AllowFastPathFunctionLibrary=1
fx.Niagara.QualityLevel=2
fx.NiagaraKuroTickUpdateTime=0.99
fx.KuroUseGPUParticles=1
r.ParticleLightQuality=2
; ============================================================
; 			Velocity Rendering
; ============================================================
r.VelocityOutputPass=1
r.VelocityForceOutput=1
; ============================================================
; 			Fog & Weather
; ============================================================
r.Fog=1
r.Mobile.Fog=1
r.ExponentialHeightFog=0
r.VolumetricFog=1
r.Kuro.EnableCacheWeatherData=1
; ============================================================
; 			NPC Distances
; ============================================================
r.Kuro.NpcAppearDistance=30000
r.Kuro.NpcDisplayDistance=25000
r.Kuro.NpcDisappearDistance=35000
; ============================================================
; 		Material & Mesh Quality
; ============================================================
r.MaterialQualityLevel=3
r.KuroMaterialQualityLevel=2
r.KuroCSCloth.Enable=1
r.ScreenSizeCullRatioFactor=1
r.Tessellation=1
r.Tessellation.MaxTessellationFactor=4
r.TessellationAdaptivePixelsPerTriangle=4
r.KuroMobile.FacialAnimationQuality=2
r.KuroMobile.SkinCacheQuality=2
r.Kuro.InteractionEffect.UseCppWaterEffect=1

; ============================================================
; 			FidelityFX FSR
; ============================================================
r.FidelityFX.FI.Enabled=1
r.FidelityFX.FSR.Enabled=1
r.FidelityFX.FSR.PrimaryUpscale=1
r.FidelityFX.FSR.QualityMode=1		
r.FidelityFX.FSR3.QualityMode=1	
r.FidelityFX.FSR3.Enabled=1
r.FidelityFX.FSR3.Sharpness=0.1
r.FidelityFX.FSR3.AccumulationAddedPerFrame=0.5
r.FidelityFX.FSR3.VelocityFactor=0.75
r.FidelityFX.FSR3.AutoExposure=0
; ============================================================
; 			Disabled Effects
; ============================================================
r.DefaultFeature.MotionBlur=0
r.MotionBlurQuality=0
r.DepthOfFieldQuality=0
r.SceneColorFringeQuality=0
r.FastBlurThreshold=0
r.FilmGrain=0
r.TranslucencyVolumeBlur=0
r.EyeAdaptationQuality=0
r.Tonemapper.GrainQuantization=0
r.VSync=0
; ============================================================
; 				Misc
; ============================================================
t.MaxFPS=120
t.MinFPS=60
r.SeparateTranslucency=1
r.Translucency.Velocity=0
r.Mobile.DisableTextureStreaming=0
r.Color.Max=1.05
r.Color.Mid=0.48
r.Tonemapper.Quality=5
r.KuroTonemapping=1
r.TonemapperGamma=1.90
r.Upscale.Quality=4
; ============================================================
; 			Sky Atmosphere
; ============================================================
r.SkyAtmosphere=1
r.SupportSkyAtmosphere=1
r.Atmosphere=1
r.Atmosphere.RayleighScatteringScale=2.0
r.Atmosphere.MieScatteringScale=1.5
;____________________________________________________________________________
;	 	  	End of System Settings
;____________________________________________________________________________

[/Script/Engine.RendererSettings]
;============================================
; 	  Early Z-Pass and pipeline
;============================================
r.EarlyZPass=3
r.EarlyZPassMovable=1
r.AllowPipelineCompile=2
TaskGraph.EnableForkedMultithreading=1

;============================================
; 	FX System async optimizations
;============================================
FX.AllowAsyncTick=1
FX.BatchAsync=1
FX.BatchAsyncBatchSize=32
FX.EarlyScheduleAsync=1

;============================================
; 	Mesh distance fields generation
;============================================
r.GenerateMeshDistanceFields=1

;============================================
; Update rate optimizations and bone transforms
;============================================
a.URO.Enable=1
a.URO.DisableInterpolation=0
bEnableUpdateRateOptimizations=True
bEnableAnimUpdateRateOptimizations=True
bOptimizeBoneTransforms=True

;============================================
; 		    Kuro
;============================================
r.Kuro.InteractiveLeavesForceMobilePreview=1

;============================================
; Other performance/optimization flags
;============================================
r.DontLimitOnBattery=1
r.SceneColorFormat=4
;____________________________________________________________________________
;	 	  	End of Renderer Settings
;____________________________________________________________________________
[/Script/Engine.StreamingSettings]
r.TextureStreaming=1
r.Streaming.Boost=1.15               ; Moderate boost to avoid unnecessary mip loading spikes
r.Streaming.FullyLoadUsedTextures=0  ; Set to 0 to save memory by streaming textures instead of forcing full load
r.Streaming.GroupBoost.CommonHLODTextureFactor=0.6  ; Slightly reduce boost for big groups to save VRAM
r.Streaming.GroupBoost.HugeBuildingTextureFactor=0.6
r.Streaming.GroupBoost.HugeFoliageTextureFactor=0.6
r.Streaming.GroupBoost.HugeNpcTextureFactor=0.6
r.Streaming.GroupBoost.LandscapeHLODTextureFactor=0.6
r.Streaming.GroupBoost.LargeBuildingTextureFactor=0.6
r.Streaming.GroupBoost.LargeFoliageTextureFactor=0.6
r.Streaming.GroupBoost.LargeNpcTextureFactor=0.6
r.Streaming.GroupBoost.LargeRocTextureFactor=0.6
r.Streaming.GroupBoost.MediumBuildingTextureFactor=0.6
r.Streaming.GroupBoost.MediumFoliageTextureFactor=0.6
r.Streaming.GroupBoost.MediumNpcTextureFactor=0.6
r.Streaming.UseAsyncRequestsForDDC=1  ; Use async requests for Derived Data Cache to prevent stalls
r.Streaming.UseBackgroundThreadPool=1 ; Enable background thread pool for streaming
r.Streaming.MinBoost=1.0              ; Keep min boost reasonable to avoid aggressive mip dropping
r.Streaming.PoolSize=1536             ; Eggsie's Recommendation
r.Streaming.PoolSizeForMeshes=768
r.Streaming.UseAllMips=0              ; Disable full mip usage to save memory by dropping highest mips on distance
r.Streaming.UseFixedPoolSize=1        ; Fixed pool size to match PoolSize
r.Streaming.UseMaterialData=1         ; Use material data to optimize streaming decisions
r.Streaming.UseNewMetrics=1           ; Newer streaming metrics provide better quality/performance balance
r.Streaming.UsePerTextureBias=1       ; Allows per texture biasing to optimize memory usage
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1          ; Keep EDL enabled for async streaming
s.WarnIfTimeLimitExceeded=0           ; Disable warnings for smoother logs
s.UseBackgroundLevelStreaming=1       ; Background streaming enabled to eliminate stalls
s.PriorityLevelStreamingActorsUpdateExtraTime=6.0 ; Eggsie's Recommendation (raised from 5 to 6)
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0               ; Lower to eliminate long unregister spikes
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0                ; Reduce async loading time budget to keep smoothness
r.RenderTargetPoolMin=400				; Eggsie's Recommendation is 600, but im lowering it to 400
s.IoDispatcherBufferMemoryMB=128			; Eggsie's Recommendation
s.IoDispatcherBufferSizeKB=256				; Eggsie's Recommendation
s.IoDispatcherCacheSizeMB=0				; Eggsie's Recommendation
s.LevelStreamingActorsUpdateTimeLimit=6.0		; Eggsie's Recommendation


