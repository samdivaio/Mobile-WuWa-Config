[SystemSettings]
r.KuroFI.Enable=1
Kuro.Blueprint.EnableGameBudget=0
r.Kuro.KuroBloomStreak=1      
r.StencilForLODDither=1
r.StencilLODMode=1
r.AllowPrecomputedVisibility=1
r.imp.UpdateBatch=32

;============================================
;	  	 Lightshafts
;============================================ 
r.LightShaftQuality=1
r.LightShaftAllowTAA=1
r.LightShaftDownSampleFactor=2
r.LightShaftBlurPasses=3
r.LightShaftNumSamples=12
r.LightShaftFirstPassDistance=0.1
r.LightShaftRenderToSeparateTranslucency=1
r.MobileLightShaft=1
r.MobileLightShaft.AllowTAA=0
r.MobileLightShaft.BloomScale=0.7
r.MobileLightShaft.DownSampleFactor=1.0
r.MobileLightShaft.NumSamples=12
r.MobileLightShaft.UseLocalLightShaft=1

;============================================
;       Screen Space Reflections/GI
;============================================ 
r.SSR.Quality=4	
r.SSR.MaxRoughness=1.0
r.SSR.Temporal=1
r.SSR.HalfResSceneColor=1
r.SSR.ExperimentalDenoiser=1
r.SSR.Stencil=1
r.SSR.TiledComposite=1
r.SSGI.Enable=1
r.SSGI.Quality=2
r.SSGI.HalfRes=1
r.ReflectionEnvironment=1
r.ReflectionEnvironmentBeginMixingRoughness=0.1
r.ReflectionEnvironmentEndMixingRoughness=0.3
r.ReflectionEnvironmentLightmapMixing=1
r.ReflectionCaptureResolution=128
r.ReflectionCaptureSupersampleFactor=2
r.RefractionQuality=1
r.Mobile.UseScreenPassSSR=1
r.Mobile.EnableLandscapeSSR=1
r.Mobile.SceneObjMobileSSR=1
r.Mobile.SSRLowPrecisionDepth=1
;============================================
;	   Temporal Anti-Aliasing
;============================================
r.TemporalAA.Algorithm=1
r.TemporalAA.AllowDownsampling=1
r.TemporalAA.AfterTonemapper=0
r.TemporalAA.MobileFrameWeight=0.4
r.TemporalAA.MobileStaticFrameWeight=0.4
r.TemporalAA.MobileUpsampling=1
r.TemporalAA.Upsampling=1
r.TemporalAA.HistoryScreenPercentage=100
r.TemporalAACurrentFrameWeight=0.4
r.TemporalAAFilterSize=1
r.TemporalAASamples=8
r.TemporalAA.MobileCatmullRom=1
r.TemporalAA.MobileGatherDepth=1
r.TemporalAA.PauseCorrect=1
;============================================
;	 	  Shadows
;============================================
r.ShadowQuality=4
r.Shadow.CSM.MaxCascades=8
r.Shadow.CSM.MaxMobileCascades=8
r.Shadow.CSMDepthBias=8.0
r.Shadow.CSM.SlopeScaleDepthBias=4.0
r.Shadow.CSMSplitPenumbraScale=0.7
r.Shadow.CSM.TransitionScale=1.0
r.Shadow.DistanceScale=1.0
r.Shadow.RadiusThreshold=0.005
r.Shadow.RadiusThresholdOverrideEnable=1
r.Shadow.MinResolution=256
r.Shadow.PerObject=1
r.CapsuleShadows=1
r.CapsuleDirectShadows=1
r.CapsuleIndirectShadows=1
r.CapsuleKuroAO=1
r.CapsuleShadowsFullResolution=0
r.Shadow.StencilCulling=1
r.Shadow.StencilOptimization=1
r.Mobile.AllowDistanceFieldShadows=1
r.Mobile.AllowDitheredLODTransition=1
;============================================
;		 Lighting and GI
;============================================
r.Kuro.GlobalLightQuality=3
r.Kuro.GlobalGIRenderQuality=3
r.SkylightIntensityMultiplier=0.75
r.SkyLight.RealTimeReflectionCapture=1
r.SkyLight.RealTimeReflectionCapture.ShadowFromOpaque=1
r.SkyLightingQuality=1
r.Kuro.EnableAtmosphereLightDirection=1
; ============================================================
; 		    Water & Reflections
; ============================================================
r.Water.SingleLayer=1
r.Water.SingleLayer.SSR=1
r.Water.SingleLayer.SSRTAA=1
r.Water.SingleLayer.TiledComposite=1
r.Water.SingleLayer.RefractionDownsampleFactor=2
r.Mobile.WaterSSR=1
r.Mobile.WaterSSRResDiv=2.0
r.Mobile.WaterSSRStep=64
; ============================================================
; 		Foliage, Grass & Landscape
; ============================================================
foliage.DensityScale=0.5
grass.densityScale=0.5
grass.DiscardDataOnLoad=0
; ============================================================
; 			Anisotropic Filtering
; ============================================================
r.AnisotropicMaterials=1
r.MaxAnisotropy=16
Compat.UseDXT5NormalMaps=0

; ============================================================
; 			Niagara & Particles
; ============================================================
Fx.AllowCulling=1
FX.AllowGPUSorting=0
FX.AllowAsyncTick=1
FX.AllowGPUParticles=1
FX.AllowCulling=1
fx.AllowFastPathFunctionLibrary=1
fx.Niagara.QualityLevel=2
fx.NiagaraKuroTickUpdateTime=0.99
fx.KuroUseGPUParticles=0
r.ParticleLightQuality=2
Niagara.GPUDrawIndirectArgsBufferSlack=4096
Niagara.GPUSorting.UseMaxPrecision=1
; ============================================================
; 			Fog & Weather
; ============================================================
r.Fog=1
r.Mobile.Fog=1
r.ExponentialHeightFog=0
r.VolumetricFog=1
r.Kuro.EnableCacheWeatherData=1

; ============================================================
; 			FidelityFX FSR
; ============================================================
r.FidelityFX.FI.Enabled=1
r.FidelityFX.FSR.Enabled=1
r.FidelityFX.FSR.PrimaryUpscale=1
r.FidelityFX.FSR.QualityMode=1		
r.FidelityFX.FSR3.QualityMode=1	
r.FidelityFX.FSR3.Enabled=1
r.FidelityFX.FSR3.Sharpness=0.1
r.FidelityFX.FSR3.AccumulationAddedPerFrame=0.2
r.FidelityFX.FSR3.VelocityFactor=1.0
r.FidelityFX.FSR3.AutoExposure=0
r.FidelityFX.FSR.Debug.ForcePS=0
; ============================================================
; 			Disabled Effects
; ============================================================
r.DefaultFeature.MotionBlur=0
r.MotionBlurQuality=0
r.DepthOfFieldQuality=0
r.SceneColorFringeQuality=0
r.FastBlurThreshold=0
r.FilmGrain=0
r.TranslucencyVolumeBlur=0
r.EyeAdaptationQuality=0
r.Tonemapper.GrainQuantization=0
r.VSync=0
; ============================================================
; 				Misc
; ============================================================
t.MaxFPS=120
r.Color.Mid=0.48
r.KuroTonemapping=1
r.TonemapperGamma=1.90

[/Script/Engine.RendererSettings]
;============================================
; 	  Early Z-Pass and pipeline
;============================================
r.EarlyZPass=3
r.EarlyZPassMovable=1
r.AllowPipelineCompile=2
TaskGraph.EnableForkedMultithreading=1

;============================================
; 	FX System async optimizations
;============================================
FX.AllowAsyncTick=1
FX.BatchAsync=1
FX.BatchAsyncBatchSize=32
FX.EarlyScheduleAsync=1

;============================================
; 	Mesh distance fields generation
;============================================
r.GenerateMeshDistanceFields=1

;============================================
; Update rate optimizations and bone transforms
;============================================
a.URO.Enable=1
a.URO.DisableInterpolation=0
bEnableUpdateRateOptimizations=True
bEnableAnimUpdateRateOptimizations=True
bOptimizeBoneTransforms=True

;============================================
; 		    Kuro
;============================================
r.Kuro.InteractiveLeavesForceMobilePreview=1

;============================================
; Other performance/optimization flags
;============================================
r.DontLimitOnBattery=1
;____________________________________________________________________________
;	 	  	End of Renderer Settings
;____________________________________________________________________________

[/Script/AndroidRuntimeSettings.AndroidRuntimeSettings]
a.UseSwappyForFramePacing=1
bEnableDynamicMaxFPS=True
r.VSync=1
rhi.SyncInterval=1

[/Script/Engine.GarbageCollectionSettings]
gc.IncrementalGCTimePerFrame=0.002
gc.TimeBetweenPurgingPendingKillObjects=31.1

[/Script/Engine.StreamingSettings]
s.AsyncLoadingTimeLimit=4.0
s.PriorityAsyncLoadingExtraTime=20.0

[Core.Log]
Puerts=none
LogJson=none
LogCsMobile=none
LogTpMobile=none

