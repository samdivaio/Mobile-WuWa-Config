; I'm refactoring the configs starting this weekend, the potato config is where i start.
;Update as of February 21, 2026
; 1. Completely removed shadows to maximize performance
;It is also worth noting that I have culled(removed) most of the grass
; 2. As of March 22, 2026, I have added the Kuro Frame Interpolation
; April 1, 2026 (Optional Patch)
; 1. Fixed floating grass: added r.StaticMeshLODDistanceScale=1.0

[SystemSettings]
r.StaticMeshLODDistanceScale=1.0
r.KuroFI.Enable=1
; Shadows and lighting
r.ShadowQuality=0
r.Shadow.PerObject=0
r.Shadow.CSM.MaxCascades=0
r.Shadow.Virtual.Enable=0
r.Shadow.Preshadows=0
r.Shadow.FarShadowDistanceOverride=0
r.Shadow.ResolutionScaleZeroDisablesSm=1
r.CapsuleDirectShadow=0
r.CapsuleIndirectShadow=0
r.AmbientOcclusion=0
r.AmbientOcclusionStaticFraction=0
r.DistanceFieldAO=0
r.SSAO=0
r.PostProcessAAQuality=0
r.RayTracing.AmbientOcclusion=0
r.CapsuleShadows=0                          ; Disable capsule shadows
r.LightShafts=0                             ; Disable light shafts
r.Fog=0                                    ; Disable fog
 
; Distance and LOD
r.ViewDistanceScale=0.5
r.StaticMeshLODBias=2                       ; Favor lower LODs
r.SkeletalMeshLODBias=2
r.LandscapeLODBias=2
r.MipMapLODBias=2                           ; Use lower mip levels
foliage.DensityScale=0                       ; Disable foliage
 
; Effects and post-processing
r.PostProcessQuality=0
r.MotionBlurQuality=0
r.DepthOfFieldQuality=0
r.BloomQuality=0
r.SceneColorFringeQuality=0
r.FilmGrain=0
 
; Anti-aliasing
r.Mobile.AntiAliasing=0
r.FidelityFX.FSR.Enabled=1
r.FidelityFX.FSR.PrimaryUpscale=1
r.FidelityFX.FSR.QualityMode=4
r.Mobile.FSR.enabled=1
r.Mobile.FSR.RCAS.enabled=1
r.Mobile.FSR.RCAS.Sharpness=0.1
r.Mobile.FSR.RCAS.Denoise=0.5
r.Mobile.FSR.Upsampling.enabled=1

; Disable TAA completely
r.TemporalAA.Algorithm=0
r.TemporalAA.Upsampling=0
r.TemporalAAUpsampleFiltered=0
r.TemporalAA.Upscaler=0

; Resolution & dynamic resolution
r.DynamicRes.OperationMode=2                ; Enable dynamic resolution
r.DynamicRes.MinScreenPercentage=40
r.DynamicRes.MaxScreenPercentage=75
 
; Streaming and texture
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.UseFixedPoolSize=1
 
; Misc optimizations
r.VSync=1
bSmoothFrameRate=True
t.MaxFPS=120
r.Mobile.DisableVertexFog=1                 ; Disable vertex fog on mobile
r.Mobile.StaticAndCSMShadowReceivers=1     ; Disable dynamic shadows on static objects
r.ParticleLightQuality=0                     ; Simplify particle lighting
r.EyeAdaptationQuality=0                     ; Disable eye adaptation
 
; Disable planar reflections and shadows
r.Mobile.PlanarReflections=0
r.Mobile.ShadowQuality=0
r.MobileDynamicPointLights=0
 
; Disable ambient occlusion and similar effects
r.Mobile.GTAO.Quality=0
r.SSGI.Quality=0
r.SSR.Quality=0
 
; Lower expensive water reflections
r.Mobile.WaterSSRResDiv=2
 
; Disable any capsule or dynamic shadows
r.CapsuleShadows=0

; Disable foliage
foliage.DensityType=0
; This line below REMOVES all grass, or keeps a super small amt of it, change it to 0 if you want them back
foliage.CullAll=1

;Kuro Stuff
r.Kuro.AutoCoolEnable=1
r.Kuro.KuroBloomStreak=0
r.KuroMobile.LensFlareQuality=0
r.Mobile.Kuro.LandscapeCaptureSize=0
wp.Runtime.KuroRuntimeStreamingRangeOverallScale=0.5
wp.Runtime.LoadingRangeScale=0.5
wp.Runtime.PlannedLoadingRangeScale=0.55

[/Script/Engine.StreamingSettings]
r.TextureStreaming=1
r.Streaming.FullyLoadUsedTextures=0  ; Set to 0 to save memory by streaming textures instead of forcing full load
r.Streaming.UseAsyncRequestsForDDC=1  ; Use async requests for Derived Data Cache to prevent stalls
r.Streaming.UseBackgroundThreadPool=1 ; Enable background thread pool for streaming
r.Streaming.UseMaterialData=1         ; Use material data to optimize streaming decisions
r.Streaming.UseNewMetrics=1           ; Newer streaming metrics provide better quality/performance balance
r.Streaming.UsePerTextureBias=1       ; Allows per texture biasing to optimize memory usage
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1          ; Keep EDL enabled for async streaming
s.WarnIfTimeLimitExceeded=0           ; Disable warnings for smoother logs
s.UseBackgroundLevelStreaming=1       ; Background streaming enabled to eliminate stalls
s.PriorityLevelStreamingActorsUpdateExtraTime=6.0 ; Eggsie's Recommendation (raised from 5 to 6)
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0               ; Lower to eliminate long unregister spikes
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0                ; Reduce async loading time budget to keep smoothness
r.RenderTargetPoolMin=400				; Eggsie's Recommendation is 600, but im lowering it to 400
s.IoDispatcherBufferMemoryMB=64
s.IoDispatcherBufferSizeKB=128
s.IoDispatcherCacheSizeMB=0			
s.LevelStreamingActorsUpdateTimeLimit=6.0

[/Script/Engine.GarbageCollectionSettings]
gc.AllowIncrementalReachability=1
gc.AllowIncrementalGather=1
gc.IncrementalReachabilityTimeLimit=0.001
gc.IncrementalGCTimePerFrame=0.001
gc.AllowInitialGarbageCollection=1
gc.CollectGarbageEveryFrame=0
gc.DisableAutomaticGC=0
gc.ForceGCAtRegularInterval=0
gc.MinDesiredObjectsPerSubTask=20
gc.StallCollectionWhileWaiting=0
gc.TimeBetweenPurgingPendingKillObjects=51.1
gc.NumRetriesBeforeForcingGC=10
gc.AllowParallelGC=1
gc.MultithreadedDestructionEnabled=1
gc.CreateGCClusters=1
gc.ActorClusteringEnabled=1
gc.AssetClusteringEnabled=1
gc.BlueprintClusteringEnabled=1
gc.PendingKillEnabled=1
gc.ContinuousIncrementalGC=0
gc.DelayReachabilityIterations=0
gc.MaxObjectsNotConsideredByGC=200
gc.SizeOfPermanentObjectPool=1572864
gc.MinGCClusterSize=5
gc.MaxObjectsInGame=800000

