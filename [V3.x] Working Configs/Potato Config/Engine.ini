; This is the config for potato phones, for further assistance, please ask for help in the discord
; I moved the cvars from device profiles to engine.ini, so you only need to paste this file

;Update as of January 11, 2026
; I created a new deviceprofile, you can use it for better textures

;Update as of January 3, 2026
; Refactored the potato config, reoptimized and cleaned unregistered cvars
; Uses FSR now for upscaling
;Update as of Dec 30, 2025
; I have commented the HZBOcclusion cvar, as it might cause crashes

; Here's a quick help for those who somehow still want the graphics to be somewhat okay.
; Just follow how the values guide I placed in the comments
;r.MaterialQualityLevel=0          ; 1 - highest, 2 - mobile/medium, 3 - epic
;r.KuroMaterialQualityLevel=0      ; 1 - highest, 2 - mobile/medium, 3 - epic
;r.Mobile.HighQualityMaterial=0    ; 1 - enable, 0 - disable
; These three influence the textures/material greatly. However, proceed with caution as this may crash your device when inputting values:
; Avoid using the value of 1 for r.KuroMaterialQualityLevel=0
; Using a value of 3 MIGHT fallback to 2 (could be unsupported by Kuro and make your shaders "transparent")

[SystemSettings]
;IF you are using a custom DeviceProfiles.ini, uncomment the following block below.
;Uncomment these lines by removing the semicolon in front of it.
;r.MaterialQualityLevel=0          ; 1 - highest, 2 - mobile/medium, 3 - epic
;r.KuroMaterialQualityLevel=0      ; 1 - highest, 2 - mobile/medium, 3 - epic
;r.Mobile.HighQualityMaterial=0    ; 1 - enable, 0 - disable
;r.Android.DisableVulkanSupport=1  ;0 - USE vulkan, 1 - USE OpenGL
;=======================================================================================

	; Scalability groups - all set to lowest (0)
sg.ViewDistanceQuality=0
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0
 
; Shadows and lighting
r.ShadowQuality=0
r.Shadow.CSM.MaxCascades=1
r.Shadow.MaxCSMResolution=128               ; Low shadow resolution
r.Shadow.DistanceScale=0.3
r.CapsuleShadows=0                          ; Disable capsule shadows
r.LightShafts=0                             ; Disable light shafts
r.Fog=0                                    ; Disable fog
 
; Distance and LOD
r.ViewDistanceScale=0.5
r.StaticMeshLODBias=2                       ; Favor lower LODs
r.SkeletalMeshLODBias=2
r.LandscapeLODBias=2
r.MipMapLODBias=2                           ; Use lower mip levels
foliage.DensityScale=0                       ; Disable foliage
 
; Effects and post-processing
r.PostProcessQuality=0
r.MotionBlurQuality=0
r.DepthOfFieldQuality=0
r.BloomQuality=0
r.SceneColorFringeQuality=0
r.FilmGrain=0
 
; Anti-aliasing
r.DefaultFeature.AntiAliasing=1                      ; Use FSR
r.FidelityFX.FSR.Enabled=True
r.FidelityFX.FSR.PrimaryUpscale=1
r.FidelityFX.FSR.QualityMode=2
; Resolution & dynamic resolution
r.DynamicRes.OperationMode=2                ; Enable dynamic resolution
r.DynamicRes.MinScreenPercentage=40
r.DynamicRes.MaxScreenPercentage=60
 
; Streaming and texture
r.Streaming.PoolSize=512                    ; Small texture pool
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.UseFixedPoolSize=1
 
; Misc optimizations
r.VSync=0                                  ; Disable VSync
bSmoothFrameRate=True
t.MinFPS=24
t.MaxFPS=60
 
r.Mobile.DisableVertexFog=1                 ; Disable vertex fog on mobile
r.Mobile.StaticAndCSMShadowReceivers=0     ; Disable dynamic shadows on static objects
 
r.ParticleLightQuality=0                     ; Simplify particle lighting
r.EyeAdaptationQuality=0                     ; Disable eye adaptation
 
; Disable planar reflections and shadows
r.Mobile.PlanarReflections=0
r.Mobile.ShadowQuality=0
r.MobileDynamicPointLights=0
 
; Disable ambient occlusion and similar effects
r.Mobile.GTAO.Quality=0
r.SSGI.Quality=0
r.SSR.Quality=0
 
; Disable expensive water reflections
r.Mobile.WaterSSRResDiv=8
 
; Disable any capsule or dynamic shadows
r.CapsuleShadows=0
 
; Disable grass
grass.Enable=0
grass.Disable=1

; Disable foliage
foliage.DensityType=0
foliage.CullAll=1

;Kuro Stuff
r.Kuro.AutoCoolEnable=1
r.Kuro.KuroBloomStreak=0
r.KuroMobile.LensFlareQuality=0
r.Mobile.Kuro.LandscapeCaptureSize=0
wp.Runtime.KuroRuntimeStreamingRangeOverallScale=0.5
wp.Runtime.LoadingRangeScale=0.5
wp.Runtime.PlannedLoadingRangeScale=0.5

; Scalability Groups repeated with lowest settings for safety
; Intentional redundancy here
[ScalabilityGroups]
sg.ViewDistanceQuality=0
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0

