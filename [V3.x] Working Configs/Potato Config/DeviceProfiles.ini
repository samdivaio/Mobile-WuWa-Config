; 			References Used:
; 1. Archived Mobile Configs by AlteriaX 	(https://github.com/AlteriaX/WuWa-Configs-Android/tree/main)
; 2. UE Official CVar Reference 	(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
; ====================END OF MAIN NOTES=======================

[Android_VeryHigh DeviceProfile]
Cvars=r.MobileContentScaleFactor=0.00   ;change to 1.00-1.40 for better performance
Cvars=r.Mobile.DeviceEvaluation=3
Cvars=r.MaterialQualityLevel=2
Cvars=r.KuroMaterialQualityLevel=2
Cvars=r.Mobile.HighQualityMaterial=1
Cvars=r.Android.DisableVulkanSupport=0  ;change to 1 if you have vulkan rendering problems
Cvars=r.FEstimation.Option=1
Cvars=wp.Runtime.LoadingRangeScale=0.80
Cvars=r.MFRC.Enable=1
Cvars=r.AFME.Enable=1
Cvars=r.AFME.Kuro.Enable=1
Cvars=r.Streaming.PoolSize=500
;sg groups
CVars=sg.ViewDistanceQuality=0
CVars=sg.AntiAliasingQuality=0
CVars=sg.ShadowQuality=0
CVars=sg.PostProcessQuality=0
CVars=sg.TextureQuality=0
CVars=sg.EffectsQuality=0
CVars=sg.FoliageQuality=0   ; for perf
CVars=sg.ShadingQuality=0

