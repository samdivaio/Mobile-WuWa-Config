; 			Final Notes
; Potato Config with High-Quality Material (SG groups zeroed)
; 1. If it does not work for you, delete ONLY this deviceprofile.
;   1.a Request a custom POTATO config in the discord. It will become my basis for future potato configs.
;	Config Main Repository: https://github.com/Arglax/Mobile-WuWa-Config/
