[Android_VeryHigh DeviceProfile] 
;	      Min Value: 0.5		   	Max Value: 2.0
;	Increase/Decrease by 0.5	High quality/performance jumps
;	Increase/Decrease by 0.25	Moderate adjustments
;	Increase/Decrease by 0.1	Fine adjustments
;	Increase/Decrease by 0.05	Very fine adjustments
;		  Suggested value range: 0.80-1.35
;			Recommended Value: 1.2
;Please do note that adjusting this value will result to Sharper(>1.35) OR blurrier(<1.35) graphics
;and yes the suggested range is correct for performance, but if you don't mind lower fps, go increase to 1.5+
;Note that you cannot go beyond your device's native/maximum screen resolution. you can check the values in GameUserSettings.ini to confirm

CVars=r.MobileContentScaleFactor=1.35			;1.0 is base render at 720p, 1.5 is default (1080)
CVars=r.SecondaryScreenPercentage.GameViewport=150	
CVars=r.ScreenPercentage=85				;85 for highest upscaling (other values could be 67 and 77)

; Anti-Aliasing (TAA in this case)
; 0 - off | 1 - FXAA | 2 - TAA | 3 - MSAA | 4 - TSR
CVars=r.DefaultFeature.AntiAliasing=2

; Frame Generation (Mediatek) || If your mobile doesn't support frame gen, changing these values will only give you a Frame Gen toggle but will not truly work
CVars=r.MFRC.Enable=1

; LOD CVars
CVars=r.imp.SSMbScaleLod0=0.0
CVars=r.imp.SSMbScaleLod1=0.0

; Performance CVars (Kuro specific preserved)
CVars=wp.Runtime.LoadingRangeScale=0.95
CVars=wp.Runtime.PlannedLoadingRangeScale=1.10

; Main CVars
CVars=r.Mobile.DeviceEvaluation=3
CVars=r.MaterialQualityLevel=3
CVars=r.KuroMaterialQualityLevel=2
CVars=r.Mobile.HighQualityMaterial=1
CVars=r.Android.DisableVulkanSupport=0
CVars=r.FEstimation.Option=1
CVars=r.DetailMode=3
CVars=r.Streaming.PoolSize=1536		;256,512,768,1024,1280,1536,1792,2048

; Audio CVars (optional)
CVars=au.RenderThreadPriority=3
CVars=au.AllowAudioSpatialization=1
CVars=au.DisableStereoSpread=0
CVars=au.DisableDistanceAttenuation=0
CVars=au.DisableOcclusion=0
CVars=au.BypassAllSubmixEffects=0
CVars=au.DisableSourceEffects=0
CVars=au.EnableBinauralAudioForAllSpatialSounds=1
CVars=au.streamcaching.PlaybackRequestPriority=0
CVars=au.streamcaching.ReadRequestPriority=0
CVars=au.DisableReverbSubmix=0
CVars=au.DisableFiltering=0
CVars=au.DisableHPFiltering=0

; Optional CVars
CVars=r.HDR.EnableHDROutput=1
CVars=r.SkeletalMeshLODBias=-1
CVars=r.MaxAnisotropy=16
CVars=r.VT.MaxAnisotropy=16
CVars=p.Chaos.Simulation.Enable=1
CVars=p.Chaos.DedicatedThreadEnabled=1
CVars=r.Shadow.MaxCSMResolution=1536

; Scalability Groups
; For mid-end devices, use 2-3 for all values, PostProcessQuality is your desired value+2
CVars=sg.ViewDistanceQuality=4	;max 4
CVars=sg.AntiAliasingQuality=4	;max 4
CVars=sg.ShadowQuality=4	;max 4
CVars=sg.PostProcessQuality=6	;max 6
CVars=sg.TextureQuality=4	;max 4
CVars=sg.EffectsQuality=4	;max 4	- value of 3 is reported to crash(?)
CVars=sg.FoliageQuality=4	;max 4
CVars=sg.ShadingQuality=4	;max 4

