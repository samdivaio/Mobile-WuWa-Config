r.Vulkan.UsePreemption=1
r.Android.DisableVulkanSupport=0
r.Vulkan.EnableRayQuery=1
r.Vulkan.RHIThreadEnabled=1
r.Vulkan.ShaderOptimization=1
r.Vulkan.ShaderLibrary=1

