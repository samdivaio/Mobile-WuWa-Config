[ConsoleVariables]
r.VelocityOutputPass=0
r.DefaultFeature.Bloom=1
r.Bloom=1
r.BloomQuality=5               ; Max quality level (0–5)
r.BloomIntensity=0.75           ; Mid-high intensity
r.BloomThreshold=0.2           ; Low threshold for wide bloom area
r.BloomSizeScale=0.8           ; Default size is 1, I reduced this
t.MaxWorkerThreads=8

; --- Chaos Physics Simulation for High-End Mobile ---
p.Chaos.Simulation.Enable=1
p.Chaos.DedicatedThreadEnabled=1                  ; Use dedicated physics thread
p.Chaos.GC.UseReplicationV2=true                   ; Improved replication
p.Chaos.Solver.Collision.AllowManifoldUpdate=1    ; Stable collision manifold
p.Chaos.DebugDraw.Enabled=false                    ; Disable debug draw
p.Chaos.Solver.Collision.CullDistance=-1           ; Precise collisions, no culling

; Solver and friction tuning
p.Chaos.NewtonEvolution.FastPositionBasedFriction=true
p.Chaos.Solver.InertiaConditioning.Enabled=true

; Threading and batching tuned for mobile CPUs
p.Chaos.MaxNumWorkers=4
p.Chaos.SmallBatchSize=10
p.Chaos.LargeBatchSize=100

; --- Apex Destruction (Legacy minimal) ---
apex.DbgDraw=false
apex.ChunkFractureEnabled=false
apex.ForceMinimalFracture=true

r.RDG.TransientAllocator=1
r.RDG.ClobberResources=1
;Extend resource lifetimes to disable aliasing and isolate leaks
r.RDG.Debug.ExtendResourceLifetimes=1
; Disable transient allocator to check if it causes leaks
r.RDG.Debug.DisableTransientResources=1
;Filter logs to a specific resource name (replace ResourceName with actual)
; r.RDG.Debug.ResourceFilter=ResourceName

;Enable verbose RDG logging to examine subresource transitions
rdg.Debug=1

[Core.Log] 
Global=Error
LogInit=Error
LogStreaming=Error
LogRHI=Error
LogVulkanRHI=Error 
LogConfig=Log
LogConsoleManager=Log
LogDeviceProfileManager=Log

