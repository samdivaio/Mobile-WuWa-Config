; ============================================================
; 		[ChangeLog] – Latest Update
; February 11, 2026 (RECOMMENDED UPDATE)
; 1. Removed
;	- Unregistered CVars
;	- Forbidden CVars (due to Kuro auto-monitoring Engine.ini)
;	- [ConsoleVariables] Chaos CVars
; 2. Added
;	- Some comments (I might re-update sometime when I get free time)
;	- FSR3 (Still gauging if MobileFSR would be better than the FSR/FR3 ones)
; 3. Adjusted
;	- [GarbageCollection]  Tdelta for purge lowered from 81.1 to 51.1 (faster GC)
;	- [SystemSettings] AO Radius Scale lowered
;	- [SystemSettings] ParticleLightQuality increased
;	- [SystemSettings] Shadow Resolution adjusted (512-1536)
;	- [RendererSettings] Vulkan-related CVars
;	- [Memory] Adjusted values, poolsize target to 1536
; 4. Other Notes
;	- Old changelog moved to a different file.
;_____________________________________________________________
; 			Final Notes
; 1. This update focuses more or anti-crashing and a bit of graphical increase
; 	- Might revert some increased visuals if people report perf issues
; 2. Recommended to use the DeviceProfiles.ini of the same category
; ============================================================
; 			References Used:
; 1. CVars Dump by em00se 		(https://pastebin.com/ewk6wz9W)
; 2. Cleaned Dump by AlteriaX/Brandy 	(https://pastebin.com/KUNNVZeC)
; 3. UE Official CVar Reference 	(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
; 4. RGCloud's 150kb Config 		(Only for the Honami Escalator inspo)
; 5. MyaMya's Config			(Discord, #config-for-testing)
; 6. Eggsee/Exie's Config		(Based on derivatives from shared community)
; ====================END OF MAIN NOTES=======================
[SystemSettings]
;============================================
;		Optional CVars
; r.HZBOcclusion
;		0: Hardware occlusion queries
;		1: Use HZB occlusion system
; 		2: Force HZB occlusion system
; 	The recommended value is 0;
; 		However, if you experience black/white flickering, change value to 1 or 2	
;	If you are going to use these, just remove the semicolon
;r.HZBOcclusion=1
;==============================================================
;	    	       FREE SPACE
;     Use this space for additional CVars you want to add
; Make sure that CVar is NOT present anywhere else in the file
;==============================================================




;============================================
;	    Enable Honami Escalator
;============================================
