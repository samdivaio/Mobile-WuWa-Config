r.Streaming.GroupBoost.MediumFoliageTextureFactor=0.6
r.Streaming.GroupBoost.MediumNpcTextureFactor=0.6
r.Streaming.UseAsyncRequestsForDDC=1  ; Use async requests for Derived Data Cache to prevent stalls
r.Streaming.UseBackgroundThreadPool=1 ; Enable background thread pool for streaming
r.Streaming.MinBoost=1.0              ; Keep min boost reasonable to avoid aggressive mip dropping
r.Streaming.PoolSize=2048             ; 2GB streaming pool is good for mid-end mobile; auto (-1) can be unstable on low memory
r.Streaming.UseAllMips=0              ; Disable full mip usage to save memory by dropping highest mips on distance
r.Streaming.UseFixedPoolSize=1        ; Fixed pool size to match PoolSize
r.Streaming.UseMaterialData=1         ; Use material data to optimize streaming decisions
r.Streaming.UseNewMetrics=1           ; Newer streaming metrics provide better quality/performance balance
r.Streaming.UsePerTextureBias=1       ; Allows per texture biasing to optimize memory usage
s.AsyncLoadingThreadEnabled=1
s.EventDrivenLoaderEnabled=1          ; Keep EDL enabled for async streaming
s.WarnIfTimeLimitExceeded=0           ; Disable warnings for smoother logs
s.UseBackgroundLevelStreaming=1       ; Background streaming enabled to eliminate stalls
s.LevelStreamingActorsUpdateTimeLimit=5.0     ; Limit update time per frame for smoother performance (lowered from 8.0)
s.PriorityLevelStreamingActorsUpdateExtraTime=5.0 
s.LevelStreamingComponentsRegistrationGranularity=5
s.UnregisterComponentsTimeLimit=1.0               ; Lower to eliminate long unregister spikes
s.LevelStreamingComponentsUnregistrationGranularity=2
s.FlushStreamingOnExit=1
s.AsyncLoadingTimeLimit=2.0                ; Reduce async loading time budget to keep smoothness

