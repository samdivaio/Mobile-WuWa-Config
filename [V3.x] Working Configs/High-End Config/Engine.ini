; 			High-End Config
; Link: https://github.com/Arglax/Mobile-WuWa-Config/blob/main/%5BV3.x%5D%20Working%20Configs/High-End%20Config/Engine.ini
; ============================================================
; 		[ChangeLog] – Latest Update
; January 3, 2025 (RECOMMENDED UPDATE)
; 1. Added detailed Optional CVar documentation (HZB Occlusion, URO ForceAnimRate / ForceInterpolation).
; 2. Introduced explicit high-quality LOD bias block (meshes, particles, landscape, textures).
; 3. Upgraded Ambient Occlusion to high-quality, full-resolution with history support (desktop & mobile).
; 4. Enabled and tuned high-quality SSR and Screen Space GI with temporal stability.
; 5. Explicitly configured Light Shafts and disabled Lens Flare for artifact-free rendering.
; 6. Explicitly disabled Bloom while retaining low-intensity parameters for optional re-enable.
; 7. Upgraded Temporal AA quality and removed Temporal Super Resolution (TSR) (I'm having issues with TSR atm, prolly skill issue lol).
; 8. Expanded CSM shadow cascades, increased precision, and enabled capsule / distance field shadows on mobile.
; 9. Improved global lighting and GI quality with real-time skylight reflections.
; 10. Added r.HDR.EnableHDROutput=1.
; 11. Tuned foliage, grass, and landscape LODs and capture distances for higher detail stability.
; 12. Reenabled Virtual Textures and VT lightmaps with tuned pool size and tile configuration.
; 13. Enabled GPU Niagara, async ticking, and extended particle view distance.
; 14. Added Sky Atmosphere with tuned Rayleigh and Mie scattering.
; 15. Refined streaming budgets, async loading, and incremental GC for better performance.
; 16. Locked FPS limits, disabled VSync, and enabled Swappy for improved frame pacing on Android.
;_____________________________________________________________
; 			Final Notes
; 1. The graphics of V2.8 is back in 3.0. If you encounter any issue let me know
; If fps drop is unbearable:
; -> Lower your DeviceProfiles.ini's Cvars=r.MobileContentScaleFactor
; -> use Stable Config or Potato Config
; 2. Past Changelog will be put in a different file to avoid being crowded
; ============================================================
; 			References Used:
; 1. CVars Dump by em00se 				(https://pastebin.com/ewk6wz9W)
; 2. Cleaned Dump by AlteriaX/Brandy 	(https://pastebin.com/KUNNVZeC)
; 3. UE Official CVar Reference 		(https://dev.epicgames.com/documentation/en-us/unreal-engine/unreal-engine-console-variables-reference)
; 4. RGCloud's 150kb Config 			(Only for the Honami Escalator inspo)
; 5. MyaMya's Config					(Discord, #config-for-testing)
; ====================END OF MAIN NOTES=======================

[SystemSettings]
;============================================
;				Optional CVars
; r.HZBOcclusion
;		0: Hardware occlusion queries
;		1: Use HZB occlusion system
; 		2: Force HZB occlusion system
; 	The recommended value is 0;
; 		However, if you experience black/white flickering, change value to 1 or 2	
;--------------------------------------------
; a.URO.ForceAnimRate
;		0: Disabled, Engine auto-sets
;		1: Update every frame (no optimization)
;		2: Update every 2 frames
;		N: Update every N frames
; 	The recommended value is 0;
;		However, if you experience stuttering, try to change the value to 2 or 3
;		Careful with high values, it can break the animations of mobs
;		For example, setting it to 60 will cause NPC sliding/not walking in Startorch Academy
; a.URO.ForceInterpolation
;		0: Disabled, default
;		1: Enabled, Force interpolation
;	The recommended value is 0;
;		Use case is when experiencing stuttering, enable this
;============================================
;	If you are going to use these, just remove the semicolon
;r.HZBOcclusion=0
;a.URO.ForceAnimRate=0
;a.URO.ForceInterpolation=0
r.HDR.EnableHDROutput=1
